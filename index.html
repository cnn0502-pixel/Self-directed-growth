<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>자기주도 학습 점검판</title>

<!-- iPhone 홈 화면 앱 설정 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학습 점검판">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d1117'/%3E%3Ccircle cx='90' cy='90' r='52' fill='none' stroke='%2322333f' stroke-width='10'/%3E%3Ccircle cx='90' cy='90' r='52' fill='none' stroke='%2340e0a0' stroke-width='10' stroke-linecap='round' stroke-dasharray='245' stroke-dashoffset='80' transform='rotate(-90 90 90)'/%3E%3Ccircle cx='90' cy='90' r='12' fill='%2340e0a0'/%3E%3C/svg%3E">

<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --panel-2:#1c232c;
    --line:#283039;
    --line-2:#323b46;
    --txt:#e6edf3;
    --muted:#7d8896;
    --dim:#5a6570;
    --on:#3fe0a0;
    --on-glow:rgba(63,224,160,.18);
    --amber:#f5b14c;
    --amber-dim:rgba(245,177,76,.15);
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg)}
  body{
    font-family:var(--sans);color:var(--txt);
    padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 28px);
    max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(120% 60% at 50% -10%, #131a22 0%, var(--bg) 60%);
  }

  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .head .label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  .head .live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--on);box-shadow:0 0 8px var(--on)}
  h1{font-size:20px;font-weight:700;letter-spacing:-.01em;margin:2px 0 18px}

  .gauges{display:grid;grid-template-columns:1.15fr 1fr;gap:12px;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}
  .gauge-card{display:flex;align-items:center;gap:14px}
  .ring{position:relative;width:96px;height:96px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1}
  .ring .den{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .gauge-meta .t{font-size:12px;color:var(--muted);letter-spacing:.02em}
  .gauge-meta .pct{font-family:var(--mono);font-size:30px;font-weight:600;margin-top:2px;line-height:1}
  .gauge-meta .sub{font-size:11px;color:var(--dim);margin-top:5px}

  .streak-card{display:flex;flex-direction:column;justify-content:center;background:linear-gradient(160deg,#1d2128,#161b22)}
  .streak-card .t{font-size:12px;color:var(--muted)}
  .streak-num{font-family:var(--mono);font-size:42px;font-weight:600;color:var(--amber);line-height:1;margin:4px 0 2px;text-shadow:0 0 18px var(--amber-dim)}
  .streak-card .u{font-size:12px;color:var(--dim)}
  .streak-card .hint{font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.4}

  .sec{display:flex;align-items:baseline;gap:10px;margin:0 2px 12px}
  .sec .n{font-family:var(--mono);font-size:11px;color:var(--on);letter-spacing:.15em}
  .sec h2{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .sec .r{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim)}

  .checks{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
  .row{
    display:flex;align-items:center;gap:14px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:14px 15px;cursor:pointer;
    transition:border-color .18s, background .18s;user-select:none;
  }
  .row:active{background:var(--panel-2)}
  .row.on{border-color:rgba(63,224,160,.4);background:linear-gradient(90deg,var(--on-glow),transparent 60%),var(--panel)}
  .lamp{
    width:26px;height:26px;flex:0 0 auto;border-radius:50%;
    border:2px solid var(--line-2);background:#10151b;position:relative;
    transition:all .2s;
  }
  .lamp::after{content:"";position:absolute;inset:0;margin:auto;width:10px;height:10px;border-radius:50%;background:transparent;transition:all .2s}
  .row.on .lamp{border-color:var(--on);box-shadow:0 0 14px var(--on-glow),inset 0 0 8px var(--on-glow)}
  .row.on .lamp::after{background:var(--on);box-shadow:0 0 10px var(--on)}
  .row .body{flex:1;min-width:0}
  .row .tag{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.06em;margin-bottom:3px}
  .row.on .tag{color:var(--on)}
  .row .txt{font-size:13.5px;line-height:1.35;color:var(--txt);font-weight:450}
  .row.on .txt{color:#fff}

  /* 오늘의 단 하나 — 최우선 과제 (입력형) */
  .row.prio{align-items:flex-start;cursor:default;border-color:rgba(245,177,76,.32);
    background:linear-gradient(90deg,var(--amber-dim),transparent 55%),var(--panel)}
  .row.prio .lamp{margin-top:2px;cursor:pointer}
  .row.prio.on{border-color:rgba(245,177,76,.55)}
  .row.prio .tag{color:var(--amber)}
  .row.prio .txt{font-weight:600;font-size:14px}
  .prio-input{margin-top:10px;width:100%;background:#10151b;border:1px solid var(--line-2);
    border-radius:10px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:var(--sans);line-height:1.4}
  .prio-input::placeholder{color:var(--dim)}
  .prio-input:focus{outline:none;border-color:var(--amber);background:#131922}

  .meters{display:flex;flex-direction:column;gap:11px;margin-bottom:24px}
  .meter{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px}
  .meter .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .meter .name{font-size:12.5px;color:var(--txt)}
  .meter .name span{color:var(--dim);font-size:11px}
  .meter .val{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .meter .val b{color:var(--txt);font-weight:600}
  .meter.done .val b{color:var(--on)}
  .seg{display:flex;gap:3px}
  .seg i{flex:1;height:8px;border-radius:3px;background:#222a33;transition:background .3s}
  .seg i.f{background:var(--on)}
  .meter.amber .seg i.f{background:var(--amber)}

  .cal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:22px}
  .cal .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
  .cal .top .m{font-size:13px;font-weight:600}
  .cal .top .lg{font-family:var(--mono);font-size:10px;color:var(--dim);display:flex;gap:10px;align-items:center}
  .cal .top .lg .d{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:3px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .grid .wd{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;padding-bottom:2px}
  .cell{aspect-ratio:1;border-radius:5px;background:#1a212a;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--dim)}
  .cell.today{outline:1.5px solid var(--amber);outline-offset:-1px}
  .cell.l1{background:#1f3b30;color:#9fd9bf}
  .cell.l2{background:#256b4d;color:#d6f3e4}
  .cell.l3{background:#2f9d6c;color:#0d1117;font-weight:600}
  .cell.l4{background:var(--on);color:#0d1117;font-weight:700}

  .foot{display:flex;gap:10px;justify-content:center;margin-top:4px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer}
  .btn:active{background:var(--panel)}
  .note{text-align:center;font-size:10.5px;color:var(--dim);margin-top:14px;line-height:1.5}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

  <div class="head">
    <span class="label">SELF-EDU · CONTROL PANEL</span>
    <span class="live"><span class="dot"></span><span id="liveDate">--/--</span></span>
  </div>
  <h1 id="today">오늘의 점검판</h1>

  <div class="gauges">
    <div class="card gauge-card">
      <div class="ring">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="40" fill="none" stroke="#222a33" stroke-width="9"/>
          <circle id="ringFill" cx="48" cy="48" r="40" fill="none" stroke="var(--on)" stroke-width="9"
                  stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="251.3"/>
        </svg>
        <div class="center"><span class="num" id="ringNum">0</span><span class="den" id="ringDen">/ 7</span></div>
      </div>
      <div class="gauge-meta">
        <div class="t">오늘 가동률</div>
        <div class="pct" id="pct">0%</div>
        <div class="sub" id="ringSub">하나만 켜도 시작입니다</div>
      </div>
    </div>

    <div class="card streak-card">
      <div class="t">연속 실천일</div>
      <div class="streak-num" id="streak">0</div>
      <div class="u">일 연속 (1개 이상 체크)</div>
      <div class="hint">끊김보다 매일이 복리를 만듭니다</div>
    </div>
  </div>

  <div class="sec">
    <span class="n">A</span><h2>오늘의 점검</h2>
    <span class="r" id="checkCount">0 / 7</span>
  </div>
  <div class="checks" id="checks"></div>

  <div class="sec">
    <span class="n">B</span><h2>목표 게이지 · 월간 점검 자동 집계</h2>
  </div>
  <div class="meters" id="meters"></div>

  <div class="cal">
    <div class="top">
      <span class="m" id="calMonth">2026 · 0월</span>
      <span class="lg">가동률
        <span><span class="d" style="background:#1f3b30"></span></span>
        <span><span class="d" style="background:#256b4d"></span></span>
        <span><span class="d" style="background:#2f9d6c"></span></span>
        <span><span class="d" style="background:var(--on)"></span>7/7</span>
      </span>
    </div>
    <div class="grid" id="cal"></div>
  </div>

  <div class="foot">
    <button class="btn" id="resetToday">오늘 초기화</button>
  </div>
  <div class="note">기록은 이 기기에만 저장됩니다 · 홈 화면에 추가하면 앱처럼 열립니다</div>

<script>
(function(){
  "use strict";
  const KEY = "genius_tracker_v1";

  // 항목: 1번=오늘의 단 하나(입력형) / 5번 삭제 / 2번 명칭 '노트'
  const HABITS = [
    {id:1, tag:"습관 1 · 목적", prio:true, txt:"오늘의 단 하나 — 최우선 과제"},
    {id:2, tag:"습관 2 · 능동", txt:"새로 안 것 1개를 노트에 정리했다"},
    {id:3, tag:"습관 3 · 독서", txt:"책 10페이지를 읽었다"},
    {id:4, tag:"습관 4 · 집중", txt:"알림 끄고 딥워크 블록(90분)을 가졌다"},
    {id:6, tag:"습관 6 · 기록", txt:"현장 일지 3줄(막힘·해결·교훈)을 썼다"},
    {id:7, tag:"습관 7 · 사색", txt:"입력 없이 혼자 생각하는 시간을 가졌다"},
    {id:8, tag:"습관 8 · 실행", txt:"미뤘던 일의 2분 첫 걸음을 실행했다"}
  ];
  const ACTIVE_IDS = HABITS.map(h=>h.id);
  const TOTAL = HABITS.length;

  const METERS = [
    {hid:3, label:"독서일",  sub:"습관3", target:20, period:"month", color:"on"},
    {hid:2, label:"노트",    sub:"습관2", target:10, period:"month", color:"on"},
    {hid:4, label:"딥워크 블록", sub:"습관4", target:3, period:"week", color:"amber"},
    {hid:8, label:"즉시 실행", sub:"습관8", target:15, period:"month", color:"amber"}
  ];

  let mem = {};
  function loadAll(){
    try{ const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : {}; }
    catch(e){ return mem; }
  }
  function saveAll(d){
    mem = d;
    try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){}
  }

  function ymd(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
  function parseKey(k){ const p=k.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  const today = new Date();
  const todayKey = ymd(today);

  function getDay(data, key){ return data[key] || {}; }
  function countDay(rec){ let c=0; ACTIVE_IDS.forEach(id=>{ if(rec[id]) c++; }); return c; }

  function monthCount(data, hid){
    let c=0;
    for(const k in data){
      const d=parseKey(k);
      if(d.getFullYear()===today.getFullYear() && d.getMonth()===today.getMonth() && data[k][hid]) c++;
    }
    return c;
  }
  function weekRange(){
    const d=new Date(today); const wd=(d.getDay()+6)%7;
    const mon=new Date(d); mon.setDate(d.getDate()-wd); mon.setHours(0,0,0,0);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
    return [mon,sun];
  }
  function weekCount(data, hid){
    const [mon,sun]=weekRange(); let c=0;
    for(const k in data){ const d=parseKey(k); if(d>=mon&&d<=sun&&data[k][hid]) c++; }
    return c;
  }
  function calcStreak(data){
    let c=0; const d=new Date(today);
    if(countDay(getDay(data,ymd(d)))===0) d.setDate(d.getDate()-1);
    while(true){
      if(countDay(getDay(data,ymd(d)))>=1){ c++; d.setDate(d.getDate()-1); }
      else break;
    }
    return c;
  }

  let data = loadAll();

  function render(){
    const rec = getDay(data, todayKey);
    const done = countDay(rec);

    const wdk=["일","월","화","수","목","금","토"][today.getDay()];
    document.getElementById("today").textContent =
      (today.getMonth()+1)+"월 "+today.getDate()+"일 ("+wdk+") 점검판";
    document.getElementById("liveDate").textContent =
      String(today.getMonth()+1).padStart(2,"0")+"/"+String(today.getDate()).padStart(2,"0");

    const pct = Math.round(done/TOTAL*100);
    const circ = 251.3;
    document.getElementById("ringFill").style.strokeDashoffset = circ - circ*done/TOTAL;
    document.getElementById("ringNum").textContent = done;
    document.getElementById("ringDen").textContent = "/ "+TOTAL;
    document.getElementById("pct").textContent = pct+"%";
    document.getElementById("ringSub").textContent =
      done===TOTAL ? ("완벽 가동 — 오늘 "+TOTAL+"/"+TOTAL) : done>=Math.ceil(TOTAL*0.6) ? "좋은 가동률입니다" : done>=1 ? "켜진 만큼 쌓입니다" : "하나만 켜도 시작입니다";
    document.getElementById("checkCount").textContent = done+" / "+TOTAL;

    document.getElementById("streak").textContent = calcStreak(data);

    const cont = document.getElementById("checks");
    cont.innerHTML = "";
    HABITS.forEach(h=>{
      const on = !!rec[h.id];
      const row = document.createElement("div");
      if(h.prio){
        row.className = "row prio"+(on?" on":"");
        row.innerHTML =
          '<div class="lamp"></div>'+
          '<div class="body">'+
            '<div class="tag">'+h.tag+' · 오늘의 단 하나</div>'+
            '<div class="txt">'+h.txt+'</div>'+
            '<input class="prio-input" type="text" placeholder="앵커(레퍼런스 라인)로 향하는 오늘 가장 중요한 한 가지">'+
          '</div>';
        const inp = row.querySelector(".prio-input");
        inp.value = rec.priority || "";
        inp.addEventListener("input", function(){ savePriority(inp.value); });
        inp.addEventListener("click", function(e){ e.stopPropagation(); });
        row.querySelector(".lamp").addEventListener("click", function(){ toggle(h.id); });
      } else {
        row.className = "row"+(on?" on":"");
        row.innerHTML =
          '<div class="lamp"></div>'+
          '<div class="body"><div class="tag">'+h.tag+'</div><div class="txt">'+h.txt+'</div></div>';
        row.addEventListener("click", function(){ toggle(h.id); });
      }
      cont.appendChild(row);
    });

    const mc = document.getElementById("meters");
    mc.innerHTML = "";
    METERS.forEach(m=>{
      const cur = m.period==="week" ? weekCount(data,m.hid) : monthCount(data,m.hid);
      const filled = Math.min(cur, m.target);
      const isDone = cur>=m.target;
      const periodTxt = m.period==="week" ? "이번 주" : "이번 달";
      let segs="";
      for(let i=0;i<m.target;i++) segs += '<i class="'+(i<filled?'f':'')+'"></i>';
      const el = document.createElement("div");
      el.className = "meter "+(m.color==="amber"?"amber ":"")+(isDone?"done":"");
      el.innerHTML = '<div class="top">'+
          '<div class="name">'+m.label+' <span>· '+m.sub+' · '+periodTxt+'</span></div>'+
          '<div class="val"><b>'+cur+'</b> / '+m.target+(isDone?" ✓":"")+'</div>'+
        '</div><div class="seg">'+segs+'</div>';
      mc.appendChild(el);
    });

    renderCal();
  }

  function renderCal(){
    const y=today.getFullYear(), mo=today.getMonth();
    document.getElementById("calMonth").textContent = y+" · "+(mo+1)+"월";
    const grid=document.getElementById("cal");
    grid.innerHTML="";
    ["월","화","수","목","금","토","일"].forEach(w=>{
      const e=document.createElement("div"); e.className="wd"; e.textContent=w; grid.appendChild(e);
    });
    const first=new Date(y,mo,1);
    const lead=(first.getDay()+6)%7;
    for(let i=0;i<lead;i++){ const e=document.createElement("div"); grid.appendChild(e); }
    const days=new Date(y,mo+1,0).getDate();
    for(let d=1;d<=days;d++){
      const key=ymd(new Date(y,mo,d));
      const n=countDay(getDay(data,key));
      const lv = n===0?0 : n<=2?1 : n<=4?2 : n<=6?3 : 4;
      const cell=document.createElement("div");
      cell.className="cell"+(lv?" l"+lv:"")+(key===todayKey?" today":"");
      cell.textContent=d;
      grid.appendChild(cell);
    }
  }

  function toggle(id){
    if(!data[todayKey]) data[todayKey]={};
    data[todayKey][id] = !data[todayKey][id];
    if(!data[todayKey][id]) delete data[todayKey][id];
    saveAll(data);
    render();
    if(navigator.vibrate) try{navigator.vibrate(8);}catch(e){}
  }

  function savePriority(text){
    if(!data[todayKey]) data[todayKey]={};
    if(text && text.length){ data[todayKey].priority = text; }
    else { delete data[todayKey].priority; }
    saveAll(data);
  }

  document.getElementById("resetToday").addEventListener("click", function(){
    if(confirm("오늘 체크를 모두 초기화할까요?")){
      delete data[todayKey]; saveAll(data); render();
    }
  });

  render();
})();
</script>
</body>
</html>
